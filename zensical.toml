[project]
docs_dir = "docs-src"
site_dir = "docs"
site_name = "scrutin"
site_description = "Fast watch-mode test runner for R and Python"
site_url = "https://scrutin.dev"
repo_url = "https://github.com/vincentarelbundock/scrutin"
repo_name = "vincentarelbundock/scrutin"
extra_css = ["stylesheets/home.css", "stylesheets/catppuccin-palette.css", "stylesheets/catppuccin.css"]
nav = [
  {"Home" = "index.md"},
  {"Getting Started" = "getting-started.md"},
  {"Projects and Files" = "project-discovery.md"},
{"Tools" = [
  {"Unit Tests" = [
    {"testthat (.R)" = "tools/testthat.md"},
    {"tinytest (.R)" = "tools/tinytest.md"},
    {"pytest (.py)" = "tools/pytest.md"},
  ]},
  {"Data Validation" = [
    {"pointblank (.R)" = "tools/pointblank.md"},
    {"validate (.R)" = "tools/validate.md"},
    {"Great Expectations (.py)" = "tools/great-expectations.md"},
  ]},
  {"Linters" = [
    {"jarl (.R)" = "tools/jarl.md"},
    {"ruff (.py)" = "tools/ruff.md"},
  ]},
  {"Spell Check" = [
    {"skyspell" = "tools/skyspell.md"},
    {"typos" = "tools/typos.md"},
  ]},
  ]},
  {"Frontends" = "frontends.md"},
  {"Reporters" = "reporters.md"},
  {"Watch" = "watch-mode.md"},
  {"Parallelism" = "parallelism.md"},
  {"Filter" = "filtering.md"},
  {"Keybindings" = "keybindings.md"},
  {"History" = "history.md"},
  {"Configuration" = "reference/configuration.md"},
  {"Command-Line" = "reference/cli.md"},
  {"Roadmap" = "roadmap.md"},
  {"How It Works" = "internals.md"},
]

[project.theme]
logo = "assets/logo.svg"
favicon = "assets/logo.svg"
custom_dir = "docs-src/overrides"
font.text = "Inter"
font.code = "JetBrains Mono"
features = ["content.code.copy"]

# Material palette keywords match the Catppuccin tokens we route into
# `--md-primary-fg-color` and `--md-accent-fg-color` via catppuccin.css,
# so Material's defaults already line up before our overrides apply.
# Both primary and accent are teal: teal is the single brand color for
# logos, links, hovers, and the clipboard toast. Catppuccin neutrals
# (base / mantle / surface / text) handle everything else.
[[project.theme.palette]]
scheme = "default"
primary = "teal"
accent = "teal"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "teal"
accent = "teal"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"
