[project]
docs_dir = "docs-src"
site_dir = "docs"
site_name = "scrutin"
site_description = "Fast watch-mode test runner for R and Python"
site_url = "https://vincentarelbundock.github.io/scrutin"
repo_url = "https://github.com/vincentarelbundock/scrutin"
repo_name = "vincentarelbundock/scrutin"
extra_css = ["stylesheets/home.css", "stylesheets/nord-palette.css", "stylesheets/nord.css"]
# Lightbox for screenshots: medium-zoom library + init script. Both are
# served locally (no CDN dependency). Applied to any image with the
# `.screenshot` class; see `js/lightbox.js`.
extra_javascript = ["js/medium-zoom.min.js", "js/lightbox.js"]
nav = [
  {"Home" = "index.md"},
  {"Installation" = "installation.md"},
  {"Getting Started" = "getting-started.md"},
  {"Projects and Files" = "project-discovery.md"},
{"Tools" = [
  {"Unit Tests" = [
    {"testthat .R" = "tools/testthat.md"},
    {"tinytest .R" = "tools/tinytest.md"},
    {"pytest .py" = "tools/pytest.md"},
  ]},
  {"Data Validation" = [
    {"pointblank .R" = "tools/pointblank.md"},
    {"validate .R" = "tools/validate.md"},
    {"Great Expectations .py" = "tools/great-expectations.md"},
  ]},
  {"Linters" = [
    {"jarl .R" = "tools/jarl.md"},
    {"ruff .py" = "tools/ruff.md"},
  ]},
  {"Spell Check" = [
    {"skyspell" = "tools/skyspell.md"},
    {"typos" = "tools/typos.md"},
  ]},
  ]},
  {"Frontends" = [
    {"Overview" = "frontends/index.md"},
    {"Terminal UI" = "frontends/terminal-ui.md"},
    {"Web Dashboard" = "frontends/web.md"},
    {"VS Code" = "frontends/vscode.md"},
    {"Positron" = "frontends/positron.md"},
    {"RStudio" = "frontends/rstudio.md"},
  ]},
  {"Reporters" = [
    {"Overview" = "reporters/index.md"},
    {"Plain" = "reporters/plain.md"},
    {"JUnit XML" = "reporters/junit.md"},
    {"GitHub Actions" = "reporters/github.md"},
    {"List" = "reporters/list.md"},
  ]},
  {"Filter" = "filtering.md"},
  {"Watch" = "watch-mode.md"},
  {"Parallelism" = "parallelism.md"},
  {"Keybindings" = "keybindings.md"},
  {"Configuration" = "reference/configuration.md"},
  {"Command-Line" = "reference/cli.md"},
  {"LLMs" = "llms.md"},
  {"History" = "history.md"},
  {"How It Works" = "internals.md"},
  {"Roadmap" = "roadmap.md"},
]

[project.theme]
logo = "assets/logo.svg"
favicon = "assets/logo.svg"
custom_dir = "docs-src/overrides"
font.text = "Inter"
font.code = "JetBrains Mono"
features = ["content.code.copy", "navigation.footer"]

# Material palette keywords approximate the Nord Frost we route into
# `--md-primary-fg-color` and `--md-accent-fg-color` via nord.css, so
# Material's defaults already land in the right hue family before our
# overrides apply. Both primary and accent are blue: Frost is the
# single brand color for logos, links, hovers, and the clipboard
# toast. Snow Storm / Polar Night neutrals handle everything else.
[[project.theme.palette]]
scheme = "default"
primary = "blue"
accent = "blue"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "blue"
accent = "blue"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"
