name: Install R
description: |
  Install R, pandoc, and the current package's dependencies.
  On Linux, uses Dirk Eddelbuettel's r-ci (https://eddelbuettel.github.io/r-ci/),
  which bootstraps R via r2u for fast binary apt-based package installs.
  On macOS and Windows, falls back to r-lib/actions.

inputs:
  r-version:
    description: R version to install (macOS/Windows only; r-ci picks system R on Linux).
    default: release
    required: false
  packages:
    description: Extra R packages to install beyond what DESCRIPTION declares.
    default: ""
    required: false
  needs:
    description: DESCRIPTION Config/Needs/* fields to install (macOS/Windows only).
    default: check
    required: false

runs:
  using: composite
  steps:
    # --- Linux: r-ci / r2u ---------------------------------------------------
    - name: Bootstrap R via r-ci (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        set -euo pipefail
        curl -OLs https://eddelbuettel.github.io/r-ci/run.sh
        chmod 0755 run.sh
        ./run.sh bootstrap
        ./run.sh install_all
        if [ -n "${{ inputs.packages }}" ]; then
          ./run.sh install_r ${{ inputs.packages }}
        fi

    # --- macOS / Windows: r-lib/actions --------------------------------------
    - uses: r-lib/actions/setup-pandoc@v2

    - uses: r-lib/actions/setup-r@v2
      if: runner.os != 'Linux'
      with:
        r-version: ${{ inputs.r-version }}
        use-public-rspm: true

    - uses: r-lib/actions/setup-r-dependencies@v2
      if: runner.os != 'Linux'
      with:
        extra-packages: ${{ inputs.packages }}
        needs: ${{ inputs.needs }}
