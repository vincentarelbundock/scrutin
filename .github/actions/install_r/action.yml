name: Install R
description: |
  Install R, pandoc, and the current package's dependencies using r-lib/actions.
  Cross-platform (Linux, macOS, Windows).

inputs:
  r-version:
    description: R version to install.
    default: release
    required: false
  packages:
    description: Extra R packages to install beyond what DESCRIPTION declares.
    default: ""
    required: false
  needs:
    description: DESCRIPTION Config/Needs/* fields to install.
    default: check
    required: false

runs:
  using: composite
  steps:
    - uses: r-lib/actions/setup-pandoc@v2

    - uses: r-lib/actions/setup-r@v2
      with:
        r-version: ${{ inputs.r-version }}
        use-public-rspm: true

    - uses: r-lib/actions/setup-r-dependencies@v2
      with:
        extra-packages: ${{ inputs.packages }}
        needs: ${{ inputs.needs }}
