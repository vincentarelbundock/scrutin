name: R CMD build + check
description: |
  Run R CMD build followed by R CMD check --no-tests (so docs, examples,
  vignettes, and CRAN policy are validated but test files are not executed).
  Assumes R and the package's dependencies are already installed (call
  install_r first). Does not install or invoke scrutin.

  On Linux, R CMD build + R CMD check shell out directly against the
  r-ci / r2u system R install. On macOS and Windows, the check is delegated
  to r-lib/actions/check-r-package@v2, which requires rcmdcheck; install it
  via install_r's `packages:` input on those OSes.

inputs:
  check-args:
    description: Whitespace-separated flags passed to R CMD check.
    default: "--no-manual --no-tests --as-cran"
    required: false
  build-args:
    description: Whitespace-separated flags passed to R CMD build.
    default: "--no-manual --compact-vignettes=gs+qpdf"
    required: false
  upload-snapshots:
    description: Upload testthat snapshot diffs on failure (macOS/Windows only).
    default: "true"
    required: false
  working-directory:
    description: Package root (directory containing DESCRIPTION).
    default: "."
    required: false

runs:
  using: composite
  steps:
    - name: R CMD build + check (Linux)
      if: runner.os == 'Linux'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        R CMD build ${{ inputs.build-args }} .
        pkg_tarball=$(ls -t *.tar.gz | head -n1)
        _R_CHECK_CRAN_INCOMING_=false R CMD check ${{ inputs.check-args }} "$pkg_tarball"

    # r-lib/actions/check-r-package wants its args as R-vector strings.
    - name: Convert args to R vectors (macOS/Windows)
      if: runner.os != 'Linux'
      id: r_args
      shell: bash
      run: |
        set -euo pipefail
        to_rvec() {
          local out='c('
          local first=1
          for tok in $1; do
            if [ $first -eq 1 ]; then first=0; else out="$out,"; fi
            out="$out\"$tok\""
          done
          echo "$out)"
        }
        {
          echo "check=$(to_rvec '${{ inputs.check-args }}')"
          echo "build=$(to_rvec '${{ inputs.build-args }}')"
        } >> "$GITHUB_OUTPUT"

    - name: R CMD check (macOS/Windows)
      if: runner.os != 'Linux'
      uses: r-lib/actions/check-r-package@v2
      with:
        working-directory: ${{ inputs.working-directory }}
        upload-snapshots: ${{ inputs.upload-snapshots }}
        args: ${{ steps.r_args.outputs.check }}
        build_args: ${{ steps.r_args.outputs.build }}
