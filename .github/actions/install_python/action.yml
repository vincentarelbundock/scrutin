name: Install Python (via uv)
description: Install uv and a pinned Python version. Optionally syncs a project.

inputs:
  python-version:
    description: Python version for uv to install (e.g. "3.12", "3.12.3").
    default: "3.12"
    required: false
  sync:
    description: |
      If "true", run `uv sync` in the working directory (expects pyproject.toml
      or uv.lock). If "false", only uv + Python are installed.
    default: "false"
    required: false
  working-directory:
    description: Directory to run `uv sync` in (when sync=true).
    default: "."
    required: false
  sync-args:
    description: Extra args appended to `uv sync` (e.g. "--all-extras").
    default: ""
    required: false

runs:
  using: composite
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Install Python
      shell: bash
      run: uv python install ${{ inputs.python-version }}

    - name: uv sync
      if: inputs.sync == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: uv sync --python ${{ inputs.python-version }} ${{ inputs.sync-args }}
