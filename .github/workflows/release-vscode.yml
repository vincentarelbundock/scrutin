name: Release VS Code Extension

# Triggered after the cargo-dist "Release" workflow completes, so the
# GitHub Release (which we upload VSIXs to) already exists. This removes
# the race between this workflow and release.yml creating the release.
#
# On workflow_run:
#   - github.ref is refs/heads/<default-branch> (not the tag)
#   - github.sha is the default branch HEAD (not the tagged commit)
# So every job checks out using the triggering workflow's head_sha and
# reads the tag name from `git tag --points-at HEAD`.
on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Resolve the tag from the triggering workflow's commit. Skip if that
  # commit has no tag (e.g. cargo-dist workflow ran on a PR) or if the
  # triggering workflow failed.
  gate:
    runs-on: ubuntu-22.04
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      sha: ${{ steps.resolve.outputs.sha }}
      proceed: ${{ steps.resolve.outputs.proceed }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0
      - id: resolve
        shell: bash
        run: |
          SHA=$(git rev-parse HEAD)
          TAG=$(git tag --points-at HEAD | head -1)
          if [ -z "$TAG" ]; then
            echo "No tag at $SHA; skipping."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Tag: $TAG at $SHA"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "sha=$SHA" >> "$GITHUB_OUTPUT"
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - { rust: aarch64-apple-darwin,      vsce: darwin-arm64, runner: macos-14 }
          - { rust: x86_64-apple-darwin,       vsce: darwin-x64,   runner: macos-14 }
          - { rust: x86_64-unknown-linux-gnu,  vsce: linux-x64,    runner: ubuntu-22.04 }
          - { rust: aarch64-unknown-linux-gnu, vsce: linux-arm64,  runner: ubuntu-22.04, cross: true }
          - { rust: x86_64-pc-windows-msvc,    vsce: win32-x64,    runner: windows-2022, ext: .exe }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.gate.outputs.sha }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust }}
      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install cross
        if: ${{ matrix.cross }}
        run: cargo install cross --locked

      - name: Build scrutin
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.rust }} -p scrutin
          else
            cargo build --release --target ${{ matrix.rust }} -p scrutin
          fi

      - name: Stage binary
        shell: bash
        run: |
          BIN=target/${{ matrix.rust }}/release/scrutin${{ matrix.ext }}
          make vscode-stage-binary BIN_PATH="$BIN"

      - name: Package VSIX
        shell: bash
        run: |
          cd editors/vscode && npm install --no-audit --no-fund
          cd ../..
          VERSION=$(awk -F'"' '/^version/ { print $2; exit }' Cargo.toml)
          echo "Packaging version: $VERSION"
          make vscode-package-target TARGET=${{ matrix.vsce }} VERSION="$VERSION"

      - uses: actions/upload-artifact@v7
        with:
          name: vsix-${{ matrix.vsce }}
          path: editors/vscode/dist/*.vsix

  build-universal:
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.gate.outputs.sha }}
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - run: cd editors/vscode && npm install --no-audit --no-fund
      - shell: bash
        run: |
          VERSION=$(awk -F'"' '/^version/ { print $2; exit }' Cargo.toml)
          echo "Packaging version: $VERSION"
          make vscode-package-universal VERSION="$VERSION"

      - uses: actions/upload-artifact@v7
        with:
          name: vsix-universal
          path: editors/vscode/dist/*.vsix

  publish:
    needs: [gate, build, build-universal]
    if: needs.gate.outputs.proceed == 'true'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.gate.outputs.sha }}
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - run: cd editors/vscode && npm install --no-audit --no-fund
      - uses: actions/download-artifact@v8
        with:
          pattern: vsix-*
          path: editors/vscode/dist
          merge-multiple: true

      - name: Publish to Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          VERSION=$(awk -F'"' '/^version/ { print $2; exit }' Cargo.toml)
          if [[ "$VERSION" == *-* ]]; then
            echo "Skipping Marketplace: $VERSION is a pre-release (VS Marketplace only accepts X.Y.Z)."
            exit 0
          fi
          for v in editors/vscode/dist/*.vsix; do
            if ! npx --prefix editors/vscode vsce publish --no-dependencies --packagePath "$v" -p "$VSCE_PAT"; then
              echo "vsce publish failed for $v (likely already published); continuing"
            fi
          done

      - name: Publish to Open VSX
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          for v in editors/vscode/dist/*.vsix; do
            if ! npx --prefix editors/vscode ovsx publish "$v" -p "$OVSX_PAT"; then
              echo "ovsx publish failed for $v (likely already published); continuing"
            fi
          done

      - name: Attach VSIX to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.gate.outputs.tag }}
        run: gh release upload "$TAG" editors/vscode/dist/*.vsix --clobber
