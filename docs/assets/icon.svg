<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80" role="img">
  <title>Scrutin</title>

  <!-- list panel -->
  <rect x="4" y="4" width="50" height="62" rx="5" fill="none" stroke="#0d9488" stroke-width="2"/>

  <!-- row 1 checkbox (unchecked) -->
  <rect x="12" y="16" width="11" height="11" rx="2" fill="none" stroke="#0d9488" stroke-width="1.8"/>
  <line x1="30" y1="21.5" x2="46" y2="21.5" stroke="#0d9488" stroke-width="1.5" opacity="0.45"/>

  <!-- row 2 checkbox (checked) -->
  <rect x="12" y="34" width="11" height="11" rx="2" fill="#0d9488"/>
  <polyline points="14.5,39.5 18,44 25,36.5" fill="none" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="30" y1="39.5" x2="46" y2="39.5" stroke="#0d9488" stroke-width="1.5" opacity="0.45"/>

  <!-- row 3 checkbox (unchecked) -->
  <rect x="12" y="52" width="11" height="11" rx="2" fill="none" stroke="#0d9488" stroke-width="1.8"/>
  <line x1="30" y1="57.5" x2="44" y2="57.5" stroke="#0d9488" stroke-width="1.5" opacity="0.45"/>

  <!-- magnifying glass -->
  <circle cx="54" cy="62" r="14" fill="none" stroke="#0d9488" stroke-width="2.5"/>
  <line x1="64" y1="72" x2="74" y2="79" stroke="#0d9488" stroke-width="4" stroke-linecap="round"/>
</svg>
